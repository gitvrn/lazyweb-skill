name: Codex autofix

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      mode:
        description: "Autofix mode to run"
        required: true
        default: "pr"
        type: choice
        options:
          - pr
          - main
      pr:
        description: "Pull request number for pr mode"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read

concurrency:
  group: codex-autofix-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.comment.pull_request_url || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  RISKY_PATH_REGEX: '(^|/)(\.github/workflows/|\.github/actions/|CODEOWNERS$|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$|bun\.lock$|bun\.lockb$|requirements.*\.txt$|pyproject\.toml$|poetry\.lock$|uv\.lock$|Dockerfile$|docker-compose.*\.ya?ml$|render\.ya?ml$|supabase/migrations/|migrations/|terraform/|infra/|deploy/|auth/|billing/|payments?/|stripe/|security/|secrets?/|\.env)'

jobs:
  pr-review-cloud-request:
    name: Request Codex cloud fix when API key is missing
    if: >-
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to request a cloud fix
        id: preflight
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          is_trusted_codex_author() {
            [ "$1" = "chatgpt-codex-connector[bot]" ] ||
              [ "$1" = "codex[bot]" ] ||
              [ "$1" = "openai-codex[bot]" ]
          }

          run=false
          reason="not a Codex review event"
          pr_number=""
          author=""
          marker=""

          if [ -n "${OPENAI_API_KEY}" ]; then
            reason="OPENAI_API_KEY is configured; using codex-action instead"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request_review" ]; then
            pr_number="$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")"
            author="$(jq -r '.review.user.login // ""' "${GITHUB_EVENT_PATH}")"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request_review_comment" ]; then
            pr_number="$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")"
            author="$(jq -r '.comment.user.login // ""' "${GITHUB_EVENT_PATH}")"
          fi

          if [ -n "${pr_number}" ]; then
            if is_trusted_codex_author "${author}"; then
              pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"
              head_repo="$(printf '%s' "${pr_json}" | jq -r '.head.repo.full_name')"
              head_sha="$(printf '%s' "${pr_json}" | jq -r '.head.sha')"
              if [ "${head_repo}" = "${GITHUB_REPOSITORY}" ]; then
                marker="<!-- codex-autofix-request:${head_sha} -->"
                comments="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" --paginate | jq -s 'add')"
                if printf '%s' "${comments}" | grep -Fq "${marker}"; then
                  reason="cloud fix already requested for this PR head"
                else
                  run=true
                  reason="requesting Codex cloud fix"
                fi
              else
                reason="PR head branch is in a fork; refusing automatic cloud-fix request"
              fi
            else
              reason="review/comment author is not a trusted Codex bot"
            fi
          fi

          {
            echo "run=${run}"
            echo "reason=${reason}"
            echo "pr_number=${pr_number}"
            echo "marker=${marker}"
          } >> "${GITHUB_OUTPUT}"

      - name: Explain skip
        if: steps.preflight.outputs.run != 'true'
        run: |
          echo "Skipping Codex cloud-fix request: ${{ steps.preflight.outputs.reason }}"

      - name: Ask Codex cloud to fix the review
        if: steps.preflight.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
          MARKER: ${{ steps.preflight.outputs.marker }}
        run: |
          {
            echo "${MARKER}"
            echo "@codex fix the actionable issues from your latest review. Keep the patch minimal, avoid risky files, run relevant tests, and push the fix back to this PR branch if safe."
          } > /tmp/codex-cloud-fix-request.md
          gh pr comment "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body-file /tmp/codex-cloud-fix-request.md

  pr-review-autofix:
    name: Fix Codex PR review comments
    if: >-
      github.event_name == 'pull_request_review' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'pr')
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run
        id: preflight
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_PR: ${{ inputs.pr }}
        run: |
          set -euo pipefail

          is_trusted_codex_author() {
            [ "$1" = "chatgpt-codex-connector[bot]" ] ||
              [ "$1" = "codex[bot]" ] ||
              [ "$1" = "openai-codex[bot]" ]
          }

          run=false
          reason="not a Codex review event"
          pr_number=""
          author=""

          if [ -z "${OPENAI_API_KEY}" ]; then
            reason="missing OPENAI_API_KEY Actions secret"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -z "${INPUT_PR}" ]; then
              reason="workflow_dispatch pr mode requires the pr input"
            else
              pr_number="${INPUT_PR}"
              run=true
              reason="manual PR autofix"
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request_review" ]; then
            pr_number="$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")"
            author="$(jq -r '.review.user.login // ""' "${GITHUB_EVENT_PATH}")"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request_review_comment" ]; then
            pr_number="$(jq -r '.pull_request.number' "${GITHUB_EVENT_PATH}")"
            author="$(jq -r '.comment.user.login // ""' "${GITHUB_EVENT_PATH}")"
          fi

          if [ "${run}" != "true" ] && [ -n "${pr_number}" ]; then
            if is_trusted_codex_author "${author}"; then
              run=true
              reason="Codex-authored review event"
            else
              reason="review/comment author is not a trusted Codex bot"
            fi
          fi

          if [ "${run}" = "true" ]; then
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"
            head_repo="$(printf '%s' "${pr_json}" | jq -r '.head.repo.full_name')"
            head_ref="$(printf '%s' "${pr_json}" | jq -r '.head.ref')"
            base_ref="$(printf '%s' "${pr_json}" | jq -r '.base.ref')"
            if [ "${head_repo}" != "${GITHUB_REPOSITORY}" ]; then
              run=false
              reason="PR head branch is in a fork; refusing to push fixes automatically"
            fi
          else
            head_ref=""
            base_ref=""
          fi

          {
            echo "run=${run}"
            echo "reason=${reason}"
            echo "pr_number=${pr_number}"
            echo "head_ref=${head_ref}"
            echo "base_ref=${base_ref}"
          } >> "${GITHUB_OUTPUT}"

      - name: Explain skip
        if: steps.preflight.outputs.run != 'true'
        run: |
          echo "Skipping Codex autofix: ${{ steps.preflight.outputs.reason }}"

      - name: Check out PR branch
        if: steps.preflight.outputs.run == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.preflight.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}

      - name: Capture PR review context
        if: steps.preflight.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
          BASE_REF: ${{ steps.preflight.outputs.base_ref }}
        run: |
          set -euo pipefail
          mkdir -p .codex-autofix-context
          printf '\n.codex-autofix-context/\n' >> .git/info/exclude

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > .codex-autofix-context/pull-request.json
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" --paginate | jq -s 'add' > .codex-autofix-context/reviews.json
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/comments" --paginate | jq -s 'add' > .codex-autofix-context/review-comments.json
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate | jq -s 'add' > .codex-autofix-context/issue-comments.json
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/codex/prompts/autofix-pr.md?ref=${BASE_REF}" --jq .content |
            tr -d '\n' |
            base64 -d > .codex-autofix-context/autofix-pr.md

          git fetch --no-tags origin "${BASE_REF}" || true
          git diff --stat "origin/${BASE_REF}...HEAD" > .codex-autofix-context/pr-diff-stat.txt || true

      - name: Run Codex
        if: steps.preflight.outputs.run == 'true'
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
          BASE_REF: ${{ steps.preflight.outputs.base_ref }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-autofix-context/autofix-pr.md
          output-file: .codex-autofix-context/codex-output.md
          sandbox: workspace-write
          codex-args: '["--ephemeral"]'

      - name: Classify changes
        if: steps.preflight.outputs.run == 'true'
        id: changes
        run: |
          set -euo pipefail
          git diff --name-only > .codex-autofix-context/changed-files.txt
          git ls-files --others --exclude-standard >> .codex-autofix-context/changed-files.txt
          sort -u .codex-autofix-context/changed-files.txt -o .codex-autofix-context/changed-files.txt

          if [ ! -s .codex-autofix-context/changed-files.txt ]; then
            {
              echo "has_changes=false"
              echo "safe=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if grep -E "${RISKY_PATH_REGEX}" .codex-autofix-context/changed-files.txt > .codex-autofix-context/risky-files.txt; then
            {
              echo "has_changes=true"
              echo "safe=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "has_changes=true"
            echo "safe=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Comment when no patch was needed
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
        run: gh pr comment "${PR_NUMBER}" --body "Codex autofix ran, but found no safe patch to apply."

      - name: Comment when patch is risky
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.safe != 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
        run: |
          {
            echo "Codex autofix produced a patch, but it touched guarded files, so I did not push it automatically."
            echo
            echo "Guarded files:"
            sed 's/^/- `/' .codex-autofix-context/risky-files.txt | sed 's/$/`/'
          } > .codex-autofix-context/risky-comment.md
          gh pr comment "${PR_NUMBER}" --body-file .codex-autofix-context/risky-comment.md
          exit 1

      - name: Commit and push PR autofix
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.safe == 'true'
        env:
          HEAD_REF: ${{ steps.preflight.outputs.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "codex-autofix[bot]"
          git config user.email "codex-autofix[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address Codex review comments"
          git push origin "HEAD:${HEAD_REF}"

      - name: Comment on PR autofix
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
        run: gh pr comment "${PR_NUMBER}" --body "Pushed a Codex autofix commit for the actionable Codex review comments. CI is the merge gate."

      - name: Request auto-merge when protected
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.preflight.outputs.pr_number }}
          BASE_REF: ${{ steps.preflight.outputs.base_ref }}
        run: |
          has_required_checks() {
            branch="$1"
            if protection="$(gh api "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" 2>/dev/null)"; then
              count="$(printf '%s' "${protection}" | jq '((.required_status_checks.contexts // []) | length) + ((.required_status_checks.checks // []) | length)')"
              if [ "${count}" -gt 0 ]; then
                return 0
              fi
            fi
            if rules="$(gh api "repos/${GITHUB_REPOSITORY}/rules/branches/${branch}" 2>/dev/null)"; then
              count="$(printf '%s' "${rules}" | jq '[.. | objects | select(.type? == "required_status_checks") | .parameters.required_status_checks[]?] | length')"
              if [ "${count}" -gt 0 ]; then
                return 0
              fi
            fi
            return 1
          }

          if has_required_checks "${BASE_REF}"; then
            gh pr merge "${PR_NUMBER}" --auto --squash --delete-branch || \
              gh pr comment "${PR_NUMBER}" --body "Codex pushed an autofix, but GitHub auto-merge is not available for this PR. Merge after CI passes."
          else
            gh pr comment "${PR_NUMBER}" --body "Codex pushed an autofix. I did not request auto-merge because `${BASE_REF}` does not have branch protection/required checks configured."
          fi

  main-push-autofix:
    name: Open repair PR after direct default-branch push
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run
        id: preflight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          run=true
          reason="direct default-branch push"

          if [ -z "${OPENAI_API_KEY}" ]; then
            run=false
            reason="missing OPENAI_API_KEY Actions secret"
          elif [ "${GITHUB_ACTOR}" = "github-actions[bot]" ] || [ "${GITHUB_ACTOR}" = "codex-autofix[bot]" ]; then
            run=false
            reason="bot-authored push"
          fi

          {
            echo "run=${run}"
            echo "reason=${reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Explain skip
        if: steps.preflight.outputs.run != 'true'
        run: |
          echo "Skipping Codex main autofix: ${{ steps.preflight.outputs.reason }}"

      - name: Check out default branch
        if: steps.preflight.outputs.run == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}

      - name: Prepare main-push context
        if: steps.preflight.outputs.run == 'true'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .codex-autofix-context
          printf '\n.codex-autofix-context/\n' >> .git/info/exclude

          branch="codex/autofix-main-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch -c "${branch}"
          echo "branch=${branch}" >> "${GITHUB_ENV}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            before_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
            after_sha="$(git rev-parse HEAD)"
          else
            before_sha="${BEFORE_SHA}"
            after_sha="${AFTER_SHA}"
          fi

          {
            echo "before=${before_sha}"
            echo "after=${after_sha}"
            echo "base_ref=${GITHUB_REF_NAME}"
          } > .codex-autofix-context/main-push.txt

          if [ -n "${before_sha}" ] && ! printf '%s' "${before_sha}" | grep -Eq '^0+$'; then
            git diff --stat "${before_sha}..${after_sha}" > .codex-autofix-context/main-diff-stat.txt || true
            git diff "${before_sha}..${after_sha}" > .codex-autofix-context/main.diff || true
          else
            git show --stat --oneline --no-renames "${after_sha}" > .codex-autofix-context/main-diff-stat.txt || true
            git show --no-renames --format=medium "${after_sha}" > .codex-autofix-context/main.diff || true
          fi

      - name: Run Codex
        if: steps.preflight.outputs.run == 'true'
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/autofix-main.md
          output-file: .codex-autofix-context/codex-output.md
          sandbox: workspace-write
          codex-args: '["--ephemeral"]'

      - name: Classify changes
        if: steps.preflight.outputs.run == 'true'
        id: changes
        run: |
          set -euo pipefail
          git diff --name-only > .codex-autofix-context/changed-files.txt
          git ls-files --others --exclude-standard >> .codex-autofix-context/changed-files.txt
          sort -u .codex-autofix-context/changed-files.txt -o .codex-autofix-context/changed-files.txt

          if [ ! -s .codex-autofix-context/changed-files.txt ]; then
            {
              echo "has_changes=false"
              echo "safe=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if grep -E "${RISKY_PATH_REGEX}" .codex-autofix-context/changed-files.txt > .codex-autofix-context/risky-files.txt; then
            {
              echo "has_changes=true"
              echo "safe=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "has_changes=true"
            echo "safe=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Stop on risky main patch
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.safe != 'true'
        run: |
          echo "Codex produced a guarded patch. Refusing to open an auto-merge PR."
          cat .codex-autofix-context/risky-files.txt
          exit 1

      - name: Open auto-merge repair PR
        if: steps.preflight.outputs.run == 'true' && steps.changes.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOFIX_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config user.name "codex-autofix[bot]"
          git config user.email "codex-autofix[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: Codex autofix after main push"
          git push origin "HEAD:${branch}"

          {
            echo "Codex found and fixed a serious issue introduced by a direct push to ${GITHUB_REF_NAME}."
            echo
            echo "This PR was created automatically. It should merge only after required checks pass."
          } > .codex-autofix-context/pr-body.md

          pr_url="$(gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${branch}" \
            --title "fix: Codex autofix after main push" \
            --body-file .codex-autofix-context/pr-body.md)"

          has_required_checks() {
            branch="$1"
            if protection="$(gh api "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" 2>/dev/null)"; then
              count="$(printf '%s' "${protection}" | jq '((.required_status_checks.contexts // []) | length) + ((.required_status_checks.checks // []) | length)')"
              if [ "${count}" -gt 0 ]; then
                return 0
              fi
            fi
            if rules="$(gh api "repos/${GITHUB_REPOSITORY}/rules/branches/${branch}" 2>/dev/null)"; then
              count="$(printf '%s' "${rules}" | jq '[.. | objects | select(.type? == "required_status_checks") | .parameters.required_status_checks[]?] | length')"
              if [ "${count}" -gt 0 ]; then
                return 0
              fi
            fi
            return 1
          }

          if has_required_checks "${GITHUB_REF_NAME}"; then
            gh pr merge "${pr_url}" --auto --squash --delete-branch || \
              gh pr comment "${pr_url}" --body "Codex opened this repair PR, but GitHub auto-merge is not available for this PR. Merge after CI passes."
          else
            gh pr comment "${pr_url}" --body "Codex opened this repair PR. I did not request auto-merge because `${GITHUB_REF_NAME}` does not have branch protection/required checks configured."
          fi
